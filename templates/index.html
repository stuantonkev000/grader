<!DOCTYPE html>
<html>
<head>
    <title>AI Worksheet Grader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow p-4">
                <h2 class="text-center mb-4">AI Math Worksheet Grader</h2>

                <form action="/grade" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Paste your worksheet answers:</label>
                        <textarea 
                            class="form-control" 
                            name="worksheet" 
                            rows="8" 
                            placeholder="Example:
1) 2x + 3 = 7
2) 5x - 4 = 6
..."></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Grade Worksheet
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
